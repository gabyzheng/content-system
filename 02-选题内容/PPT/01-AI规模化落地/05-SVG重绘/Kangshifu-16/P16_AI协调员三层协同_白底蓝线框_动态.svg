<rect class="card cap1" x="220" y="1395" width="1080" height="460" rx="32"/>
<text x="292" y="1490" class="capnum" text-anchor="start" >①</text>
<text x="390" y="1488" class="label" text-anchor="start" >任务派发员</text>
<text x="292" y="1565" class="body" text-anchor="start" >· 按 SOP 模板自动拆 8 部门任务节点</text>
<text x="292" y="1612" class="body" text-anchor="start" >· 带责任人 / 截止 / 前置依赖 / 输出物</text>
<text x="292" y="1659" class="body" text-anchor="start" >· 直派对应同事飞书，带上下文</text>
<rect x="292" y="1705" width="930" height="108" rx="22" fill="#F4F8FF" stroke="#8CB8F2" stroke-width="3"/>
<text x="330" y="1744" class="bubble-who" text-anchor="start" >飞书 · 来自 AI 助理</text>
<text x="330" y="1785" class="bubble-text" text-anchor="start" >@研发小李，NPD-0541 配方稳定性测试 6/15 出结论；</text>
<text x="330" y="1818" class="bubble-text" text-anchor="start" >前置依赖：工艺试产数据（6/10 到位）</text>
<rect class="card cap2" x="1380" y="1395" width="1080" height="460" rx="32"/>
<text x="1452" y="1490" class="capnum" text-anchor="start" >②</text>
<text x="1550" y="1488" class="label" text-anchor="start" >信息汇总员</text>
<text x="1452" y="1565" class="body" text-anchor="start" >· 8 系统（PLM/SAP/MES/LIMS/APS/TPM）只读拉通</text>
<text x="1452" y="1612" class="body" text-anchor="start" >· 每新品 1 张健康度看板：研发 ✓ 工艺 ⚠ 物料 ⚠</text>
<text x="1452" y="1659" class="body" text-anchor="start" >· 一键穿透，看到字段背后的数据源</text>
<rect x="1452" y="1705" width="930" height="108" rx="22" fill="#F1FCFB" stroke="#74CFCB" stroke-width="3"/>
<text x="1490" y="1744" class="bubble-who" text-anchor="start" >健康度看板 · NPD-0541</text>
<text x="1490" y="1785" class="bubble-text" text-anchor="start" >研发 ✓　工艺 ⚠（良率 82%）　物料 ⚠（供应商待认证）</text>
<text x="1490" y="1818" class="bubble-text" text-anchor="start" >铺货 —｜5 分钟前更新</text>
<rect class="card cap3" x="2540" y="1395" width="1080" height="460" rx="32"/>
<text x="2612" y="1490" class="capnum" text-anchor="start" >③</text>
<text x="2710" y="1488" class="label" text-anchor="start" >风险雷达员</text>
<text x="2612" y="1565" class="body" text-anchor="start" >· 进度：节点到期未完成 → 自动催办</text>
<text x="2612" y="1612" class="body" text-anchor="start" >· 协同：跨节点数据冲突 → 触发对齐</text>
<text x="2612" y="1659" class="body" text-anchor="start" >· 历史：类似新品历史卡点 → 立项预警</text>
<text x="2612" y="1706" class="body" text-anchor="start" >· 经验：老师傅经验库红线 → 立即提醒</text>
<rect x="2612" y="1745" width="930" height="108" rx="22" fill="#FFF7E6" stroke="#E1B65A" stroke-width="3"/>
<text x="2650" y="1784" class="bubble-who" text-anchor="start" >红色预警 · NPD-0541</text>
<text x="2650" y="1825" class="bubble-text" text-anchor="start" >试产良率 82% &lt; 历史阈值 90%；陈师傅经验库匹配：</text>
<text x="2650" y="1858" class="bubble-text" text-anchor="start" >降低喷雾塔进风温度 3°C</text>
<line x1="560" y1="1935" x2="3280" y2="1935" stroke="#BFD4F2" stroke-width="3"/>
<text x="1920" y="2000" class="label" text-anchor="middle">下任务的依然是人 · 做判断的依然是人 · 拍板的依然是人</text>
<text x="1920" y="2060" class="label" text-anchor="middle" fill="#C8942D">AI 不替代任何人的判断，只接管“信息流动”这一件事</text>
</svg>