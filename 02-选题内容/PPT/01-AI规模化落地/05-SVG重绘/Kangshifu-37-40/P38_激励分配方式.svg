<text x="180" y="320" class="title" text-anchor="start">重新思考激励分配方式</text><text x="180" y="385" class="subtitle" text-anchor="start">同岗位的人正在被 AI 拉开 10 倍，旧的激励逻辑跟不上了</text><rect x="260" y="620" width="990" height="760" class="card" /><text x="320" y="705" class="label" text-anchor="start">销售BD</text><text x="350" y="910" class="big" text-anchor="start">5</text><rect x="500" y="850" width="95" height="210" rx="18" fill="#DDE8F6"/><rect x="730" y="690" width="180" height="370" rx="18" fill="#C8942D" opacity="0.92"/><text x="960" y="910" class="big" text-anchor="start">50</text><text x="350" y="1140" class="small" text-anchor="start">封邮件 / 天</text><path d="M610 880 C655 800,685 760,715 730" class="lineGold" marker-end="url(#arrowGold)"/><rect x="320" y="1230" width="870" height="86" rx="43" fill="#F4F8FF" stroke="#8CB8F2" stroke-width="3"/><text x="755" y="1286" class="label" text-anchor="middle">10× 个性化能力</text><rect x="1390" y="620" width="990" height="760" class="card" /><text x="1450" y="705" class="label" text-anchor="start">产品经理</text><text x="1480" y="910" class="big" text-anchor="start">1</text><rect x="1630" y="850" width="95" height="210" rx="18" fill="#DDE8F6"/><rect x="1860" y="690" width="180" height="370" rx="18" fill="#C8942D" opacity="0.92"/><text x="2090" y="910" class="big" text-anchor="start">3</text><text x="1480" y="1140" class="small" text-anchor="start">版PRD / 天</text><path d="M1740 880 C1785 800,1815 760,1845 730" class="lineGold" marker-end="url(#arrowGold)"/><rect x="1450" y="1230" width="870" height="86" rx="43" fill="#F4F8FF" stroke="#8CB8F2" stroke-width="3"/><text x="1885" y="1286" class="label" text-anchor="middle">3× 共创深度</text><rect x="2520" y="620" width="990" height="760" class="card" /><text x="2580" y="705" class="label" text-anchor="start">设计师</text><text x="2610" y="910" class="big" text-anchor="start">2</text><rect x="2760" y="850" width="95" height="210" rx="18" fill="#DDE8F6"/><rect x="2990" y="690" width="180" height="370" rx="18" fill="#C8942D" opacity="0.92"/><text x="3220" y="910" class="big" text-anchor="start">20</text><text x="2610" y="1140" class="small" text-anchor="start">张方案 / 天</text><path d="M2870 880 C2915 800,2945 760,2975 730" class="lineGold" marker-end="url(#arrowGold)"/><rect x="2580" y="1230" width="870" height="86" rx="43" fill="#F4F8FF" stroke="#8CB8F2" stroke-width="3"/><text x="3015" y="1286" class="label" text-anchor="middle">10× 迭代速度</text><rect x="430" y="1510" width="2980" height="260" class="cardBlue" /><text x="1920" y="1606" class="label" text-anchor="middle">如果团队里出现了一个产出 10 倍于同事的人，这不是个人英雄。</text><text x="1920" y="1686" class="label" text-anchor="middle">这是一个信号：组织需要重新思考“价值贡献”与“激励分配”的关系。</text><text x="180" y="2040" class="tiny">business_blue_consulting_wireframe · 3840×2160</text></svg>