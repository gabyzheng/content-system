<text x="180" y="190" class="tiny" text-anchor="start" >AI × 组织变革方法论</text><text x="180" y="320" class="title" text-anchor="start" >重新思考激励分配方式</text><text x="180" y="385" class="subtitle" text-anchor="start" >AI 让同岗位人的产出差距，从线性差异变成非线性分化</text><rect x="260" y="560" width="2500" height="1180" class="card"/><text x="340" y="655" class="label" text-anchor="start" >AI 使用深度 × 个人产出能力曲线</text><line x1="440" y1="1410.0" x2="2510" y2="1410.0" class="grid"/><line x1="440" y1="1250.0" x2="2510" y2="1250.0" class="grid"/><line x1="440" y1="1090.0" x2="2510" y2="1090.0" class="grid"/><line x1="440" y1="930.0" x2="2510" y2="930.0" class="grid"/><line x1="854.0" y1="1570" x2="854.0" y2="770" class="grid"/><line x1="1268.0" y1="1570" x2="1268.0" y2="770" class="grid"/><line x1="1682.0" y1="1570" x2="1682.0" y2="770" class="grid"/><line x1="2096.0" y1="1570" x2="2096.0" y2="770" class="grid"/><path d="M440 770 L440 1570 L2510 1570" class="axis" marker-end="url(#arrowBlue)"/><text x="360" y="745" class="small" text-anchor="start" >产出能力</text><text x="2390" y="1650" class="small" text-anchor="start" >AI 使用深度</text><text x="435" y="1632" class="tiny" text-anchor="middle" >低</text><text x="2510" y="1632" class="tiny" text-anchor="middle" >高</text><text x="368" y="1578" class="tiny" text-anchor="end" >1×</text><text x="368" y="1240" class="tiny" text-anchor="end" >3×</text><text x="368" y="784" class="tiny" text-anchor="end" >10×</text><path d="M 460 1530 C 900 1475, 1390 1450, 1830 1415 C 2010 1400, 2270 1380, 2440 1345" class="curveBase"/><text x="1860" y="1315" class="small" text-anchor="start" >传统工作方式：线性增长</text><path d="M 460 1528 C 940 1530, 1420 1450, 1730 1260 C 1990 1100, 2200 810, 2410 850 L 2410 1570 L 460 1570 Z" fill="url(#goldFade)"/><path d="M 460 1528 C 940 1530, 1420 1450, 1730 1260 C 1990 1100, 2200 810, 2410 850" class="curveAI" marker-end="url(#arrowGold)"/><text x="1860" y="850" class="label" text-anchor="start" >AI 增强工作方式：非线性拉开</text><circle cx="1600" cy="1285" r="22" fill="#C8942D" stroke="#FFFFFF" stroke-width="8"/><line x1="1600" y1="1285" x2="1750" y2="1175" stroke="#C8942D" stroke-width="4"/><rect x="1750" y="1080" width="420" height="145" rx="28" fill="#FFFFFF" stroke="#E1B65A" stroke-width="3" filter="url(#shadow)"/><text x="1782" y="1135" class="small" text-anchor="start" >产品经理</text><text x="1936" y="1135" class="bigNum" text-anchor="start" >3×</text><text x="1782" y="1193" class="tiny" text-anchor="start" >PRD 共创深度</text><circle cx="2100" cy="950" r="22" fill="#C8942D" stroke="#FFFFFF" stroke-width="8"/><line x1="2100" y1="950" x2="2250" y2="840" stroke="#C8942D" stroke-width="4"/><rect x="2250" y="745" width="420" height="145" rx="28" fill="#FFFFFF" stroke="#E1B65A" stroke-width="3" filter="url(#shadow)"/><text x="2282" y="800" class="small" text-anchor="start" >销售BD</text><text x="2436" y="800" class="bigNum" text-anchor="start" >10×</text><text x="2282" y="858" class="tiny" text-anchor="start" >个性化触达能力</text><circle cx="2380" cy="880" r="22" fill="#C8942D" stroke="#FFFFFF" stroke-width="8"/><line x1="2380" y1="880" x2="2530" y2="770" stroke="#C8942D" stroke-width="4"/><rect x="2530" y="675" width="420" height="145" rx="28" fill="#FFFFFF" stroke="#E1B65A" stroke-width="3" filter="url(#shadow)"/><text x="2562" y="730" class="small" text-anchor="start" >设计师</text><text x="2716" y="730" class="bigNum" text-anchor="start" >10×</text><text x="2562" y="788" class="tiny" text-anchor="start" >方案迭代速度</text><rect x="2920" y="600" width="700" height="1140" class="cardBlue"/><text x="2980" y="692" class="label" text-anchor="start" >组织含义</text><rect x="2974" y="770" width="592" height="230" rx="24" fill="#FFFFFF" stroke="#BFD4F2" stroke-width="3"/><circle cx="3028" cy="836" r="34" fill="#C8942D"/><text x="3028" y="848" class="tiny" text-anchor="middle" fill="#fff">01</text><text x="3085" y="844" class="label" text-anchor="start" >不是个人英雄</text><text x="3000" y="910" class="small" text-anchor="start" >产出差距来自新工具放大，</text><text x="3000" y="952" class="small" text-anchor="start" >不是单纯勤奋差异。</text><rect x="2974" y="1055" width="592" height="230" rx="24" fill="#FFFFFF" stroke="#BFD4F2" stroke-width="3"/><circle cx="3028" cy="1121" r="34" fill="#C8942D"/><text x="3028" y="1133" class="tiny" text-anchor="middle" fill="#fff">02</text><text x="3085" y="1129" class="label" text-anchor="start" >不是岗位替代</text><text x="3000" y="1195" class="small" text-anchor="start" >AI 放大人的判断、表达、</text><text x="3000" y="1237" class="small" text-anchor="start" >编排与复盘能力。</text><rect x="2974" y="1340" width="592" height="230" rx="24" fill="#FFFFFF" stroke="#BFD4F2" stroke-width="3"/><circle cx="3028" cy="1406" r="34" fill="#C8942D"/><text x="3028" y="1418" class="tiny" text-anchor="middle" fill="#fff">03</text><text x="3085" y="1414" class="label" text-anchor="start" >必须重设激励</text><text x="3000" y="1480" class="small" text-anchor="start" >考核投入会失真，组织应转向</text><text x="3000" y="1522" class="small" text-anchor="start" >价值贡献与复用价值。</text><rect x="420" y="1845" width="3000" height="170" rx="42" fill="#F4F8FF" stroke="#8CB8F2" stroke-width="3" filter="url(#shadow)"/><text x="1920" y="1925" class="label" text-anchor="middle" >当 AI 把同岗位产出拉开 3×、10×，组织真正要重构的是价值衡量方式。</text><text x="1920" y="1982" class="small" text-anchor="middle" >从“做了多少”转向“创造了多少影响、沉淀了多少可复用能力”。</text><text x="180" y="2040" class="tiny" text-anchor="start" >business_blue_consulting_wireframe · 3840×2160</text></svg>