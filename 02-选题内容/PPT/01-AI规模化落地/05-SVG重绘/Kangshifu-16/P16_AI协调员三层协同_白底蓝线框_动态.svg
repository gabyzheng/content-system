<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160">
<defs>
<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#D5E4F7" flood-opacity="0.72"/></filter>
<filter id="goldShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#D6A33A" flood-opacity="0.55"/></filter>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EEF6FF"/></linearGradient>
<linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#E8F3FF"/></linearGradient>
<style><![CDATA[
.title{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:88px;font-weight:850;fill:#12315C;letter-spacing:-1px}
.subtitle{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:42px;font-weight:500;fill:#5C6F8C}
.label{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:34px;font-weight:760;fill:#1F4E8C}
.body{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:28px;font-weight:430;fill:#26384D}
.small{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:24px;font-weight:430;fill:#5C6F8C}
.tiny{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:21px;font-weight:430;fill:#6D7F99}
.capnum{font-family:Inter,Arial,sans-serif;font-size:62px;font-weight:900;fill:#C8942D}
.card{fill:#FFFFFF;stroke:#BFD4F2;stroke-width:3;filter:url(#softShadow)}
.line{stroke:#A9C9F4;stroke-width:4;stroke-dasharray:12 12;fill:none;stroke-linecap:round}
.dept-bg{fill:#FFFFFF;stroke:#8CB8F2;stroke-width:3;filter:url(#softShadow)}
.dept-text{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:31px;font-weight:760;fill:#12315C}
.bubble-text{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:23px;font-weight:430;fill:#26384D}
.bubble-who{font-family:"Noto Sans CJK SC","Microsoft YaHei",Arial,sans-serif;font-size:20px;font-weight:800;fill:#1F6FE5;letter-spacing:.04em}
.particle-blue{fill:#1F6FE5;filter:url(#goldShadow)}.particle-teal{fill:#33AFC1;filter:url(#goldShadow)}
.scan-ring{animation:scanCycle 14s linear infinite;opacity:0}.scan-ring.r2{animation-delay:1.2s}
@keyframes scanCycle{0%,66%{r:220px;opacity:0;stroke-width:7px}68%{r:220px;opacity:.88;stroke-width:7px}82%{r:520px;opacity:.35;stroke-width:4px}90%{r:720px;opacity:0;stroke-width:2px}100%{r:720px;opacity:0;stroke-width:2px}}
.dept-risk .dept-bg{animation:deptRisk 14s linear infinite}
@keyframes deptRisk{0%,70%{fill:#FFFFFF;stroke:#8CB8F2;stroke-width:3px}73%,80%{fill:#FFF7E6;stroke:#C8942D;stroke-width:6px}82%{fill:#FFFFFF;stroke:#8CB8F2;stroke-width:3px}85%,93%{fill:#FFF7E6;stroke:#C8942D;stroke-width:6px}95%,100%{fill:#FFFFFF;stroke:#8CB8F2;stroke-width:3px}}
.risk-flag{animation:riskFlag 14s linear infinite}@keyframes riskFlag{0%,70%{opacity:0}73%,95%{opacity:1}97%,100%{opacity:0}}
.cap1{animation:capBlue 14s ease-in-out infinite}.cap2{animation:capTeal 14s ease-in-out infinite}.cap3{animation:capGold 14s ease-in-out infinite}
@keyframes capBlue{0%,28%{fill:#EAF3FF;stroke:#1F6FE5;stroke-width:6px}31%,100%{fill:#FFFFFF;stroke:#BFD4F2;stroke-width:3px}}
@keyframes capTeal{0%,31%{fill:#FFFFFF;stroke:#BFD4F2;stroke-width:3px}34%,60%{fill:#E8FBF8;stroke:#33AFC1;stroke-width:6px}63%,100%{fill:#FFFFFF;stroke:#BFD4F2;stroke-width:3px}}
@keyframes capGold{0%,63%{fill:#FFFFFF;stroke:#BFD4F2;stroke-width:3px}66%,95%{fill:#FFF7E6;stroke:#C8942D;stroke-width:6px}97%,100%{fill:#FFFFFF;stroke:#BFD4F2;stroke-width:3px}}
]]></style>
</defs>
