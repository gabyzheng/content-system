<text x="180" y="168" class="tiny" text-anchor="start" >AI × 业务流程协同</text>
<text x="3500" y="168" class="tiny" text-anchor="end" >飞书</text>
<text x="180" y="300" class="title">从“摊在 8 张桌子上”，到 <tspan fill="#C8942D">1 个 AI 协调员</tspan> 串起来</text>
<text x="180" y="372" class="subtitle" text-anchor="start" >AI 助理不替代任何人的判断，直接促进信息流动，让 8 个部门串联起来持续协作</text>
